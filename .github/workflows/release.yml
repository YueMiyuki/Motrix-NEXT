name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@v2
        if: startsWith(matrix.os, 'ubuntu')
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.snapcraft_token }}

      - name: Test Snapcraft
        if: startsWith(matrix.os, 'ubuntu')
        run: snapcraft --help

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release artifacts
        run: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.snapcraft_token }}
          TEAM_ID: ${{ secrets.team_id }}
          APPLE_ID: ${{ secrets.apple_id }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.apple_app_specific_password }}

      - name: Verify local updater metadata
        if: matrix.os != 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release/latest*.yml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No latest*.yml was generated. electron-updater requires this metadata."
            ls -la release || true
            exit 1
          fi
          printf 'Found updater metadata files:\n%s\n' "${files[@]}"

      - name: Verify release has updater metadata
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'macos-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          assets=""
          for _ in {1..10}; do
            if assets="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null)"; then
              break
            fi
            sleep 10
          done
          echo "Published assets for ${tag}:"
          echo "${assets:-}"
          if ! grep -Eq '^latest.*\.yml$' <<<"$assets"; then
            echo "::error::Release ${tag} is missing latest*.yml metadata."
            exit 1
          fi
