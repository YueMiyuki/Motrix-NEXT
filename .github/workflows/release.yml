name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin/x64
            os: macos-latest
            target: x86_64-apple-darwin
            tauri_args: ''
          - platform: darwin/arm64
            os: macos-latest
            target: aarch64-apple-darwin
            tauri_args: ''
          - platform: linux/x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tauri_args: ''
          - platform: linux/arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            tauri_args: ''
          - platform: win32/x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_args: --config src-tauri/tauri.windows.conf.json
          - platform: win32/ia32
            os: windows-latest
            target: i686-pc-windows-msvc
            tauri_args: --config src-tauri/tauri.windows.conf.json

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync aria2 binaries from latest upstream release
        if: ${{ env.SKIP_ARIA2_SYNC != 'true' }}
        run: pnpm run sync:aria2

      - name: Inject updater public key from secrets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          node -e "const fs=require('node:fs');const p='src-tauri/tauri.conf.json';const key=(process.env.TAURI_UPDATER_PUBKEY||'').trim();if(!key){console.error('TAURI_UPDATER_PUBKEY secret is required for tagged releases');process.exit(1);}const c=JSON.parse(fs.readFileSync(p,'utf8'));c.plugins??={};c.plugins.updater??={};c.plugins.updater.pubkey=key;fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');console.log('Injected updater pubkey into tauri.conf.json for this workflow run.');"
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}

      - name: Build and publish release artifacts (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target ${{ matrix.target }} ${{ matrix.tauri_args }}
          tagName: ${{ github.ref_name }}
          releaseName: Motrix ${{ github.ref_name }}
          releaseBody: See the assets for this release.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.linker }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TEAM_ID: ${{ secrets.team_id }}
          APPLE_ID: ${{ secrets.apple_id }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.apple_app_specific_password }}

      - name: Build release artifacts (manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: pnpm tauri build --target ${{ matrix.target }} ${{ matrix.tauri_args }}
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.linker }}

      - name: Verify local bundle output exists
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ ! -d "$bundle_dir" ]; then
            echo "::error::No bundle output found at $bundle_dir"
            ls -la "src-tauri/target/${{ matrix.target }}/release" || true
            exit 1
          fi
          find "$bundle_dir" -maxdepth 3 -type f | sed 's/^/built: /'

      - name: Dump macOS DMG diagnostics on failure
        if: failure() && startsWith(matrix.platform, 'darwin')
        shell: bash
        run: |
          set -euxo pipefail
          dmg_dir="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          if [ -d "$dmg_dir" ]; then
            echo "== DMG bundle directory =="
            ls -la "$dmg_dir" || true
            if [ -f "$dmg_dir/bundle_dmg.sh" ]; then
              echo "== bundle_dmg.sh =="
              sed -n '1,260p' "$dmg_dir/bundle_dmg.sh" || true
            fi
            for f in "$dmg_dir"/*.log; do
              if [ -f "$f" ]; then
                echo "== log: $f =="
                cat "$f" || true
              fi
            done
          else
            echo "DMG directory not found: $dmg_dir"
          fi
